# Access modes are deliberately conservative. Change a source to public_allowed only
# after reviewing its current Terms of Service and robots policy. URL fetching fails closed.
sources:
  - name: UTA Public Scholarship Pages
    url: https://www.uta.edu/administration/fao/scholarships
    category: uta_public
    access_mode: public_allowed
    enabled: true
    rss_url: null
    allow_submit_automation: false
    notes: Official public UTA scholarship pages. Robots allows this path; login links are excluded and Mav ScholarShop remains manual-only.

  - name: UTA Mav ScholarShop
    url: https://uta.academicworks.com/
    category: uta_manual
    access_mode: manual_only
    enabled: true
    rss_url: null
    allow_submit_automation: false
    notes: University portal; sign in manually and paste opportunity text. Never automate login or submission.

